<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="prob4.css">
    <title>pass check</title>
</head>
<body>

<div class="pass">
    <input type="text" placeholder="enter username" id="username">
    <input type="text" placeholder="enter password" id="password">

    <button onclick="verify()">Check</button>

    <p id="res"></p>
</div>

    <script>

            function verify(){

            let x = document.getElementById("password").value;

            let hasUpper = false;
            let hasNumber = false;

            if(x.length >= 8){

                for(let i=0;i<x.length;i++){

                    if(x[i] >= 'A' && x[i] <= 'Z'){
                        hasUpper = true;
                    }

                    if(x[i] >= '0' && x[i] <= '9'){
                        hasNumber = true;
                    }

                }

                if(hasUpper && hasNumber){
                    document.getElementById("res").innerHTML = "Account created successfully";
                }
                else{
                    document.getElementById("res").innerHTML = "Password must contain uppercase letter and number";
                }

            }

            else{
            document.getElementById("res").innerHTML = "Password must be at least 8 characters";
            }

            }

    </script>

</body>
</html>
